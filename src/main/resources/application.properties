spring.application.name=${SPRING_APPLICATION_NAME:portfolio}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8080}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://portfoliosbuilder.com,https://admin.portfoliosbuilder.com,https://www.portfoliosbuilder.com,https://*.portfoliosbuilder.com}
app.url=${APP_URL:http://localhost:8080}

# ===============================
# ? POSTGRESQL / JPA CONFIGURATION
# ===============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# ? FLYWAY CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.schemas=public
spring.flyway.validate-on-migrate=true


# ===============================
# ? EMAIL CONFIGURATION (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# ? JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:36000000}

# ===============================
# ?? LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure=INFO

# ===============================
# ?? CLOUDINARY
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# ? RESEND CONFIGURATION
# ===============================
resend.api.key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:no-reply@portfoliosbuilder.com}

# ===============================
# ?? SPRINGDOC / SWAGGER
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ===============================
# GITHUB INTEGRATION
# ===============================
# Set client-id, client-secret, encryption-key, state-secret in dev/prod properties
github.oauth.client-id=${GITHUB_CLIENT_ID:}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET:}
github.oauth.redirect-uri=${APP_URL:http://localhost:8080}/api/v1/github/oauth/callback
github.oauth.admin-ui-url=${ADMIN_UI_URL:http://localhost:5174}/github-integration
github.oauth.state-secret=${GITHUB_STATE_SECRET:change-me-in-production}
github.encryption.key=${GITHUB_ENCRYPTION_KEY:change-me-to-32-chars-in-prod!!}

portfolio.public.base-url=${PORTFOLIO_PUBLIC_URL:http://localhost:5173}



