spring.application.name=${SPRING_APPLICATION_NAME:portfolio}
server.port=${SERVER_PORT:8080}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173,http://localhost:3000,https://portfoliosbuilder.com,https://admin.portfoliosbuilder.com,https://www.portfoliosbuilder.com,https://*.portfoliosbuilder.com}
app.url=${APP_URL:http://localhost:8080}

# ===============================
# ? POSTGRESQL / JPA CONFIGURATION
# ===============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# ? FLYWAY CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=26


# ===============================
# ? EMAIL CONFIGURATION (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# ? JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:36000000}

# ===============================
# ?? LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure=INFO

# ===============================
# ?? CLOUDINARY
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# ? RESEND CONFIGURATION
# ===============================
resend.api.key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:no-reply@portfoliosbuilder.com}



